<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Olá GitHub Actions</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      padding: 40px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    p {
      font-size: 1.1rem;
      color: #cbd5e1;
      margin-bottom: 24px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: #ffffff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    button:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .message {
      margin-top: 20px;
      font-size: 1rem;
      color: #86efac;
      display: none;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Olá GitHub Actions</h1>
    <p>Página estática criada com HTML, CSS e JavaScript puro.</p>

    <button onclick="mostrarMensagem()">Executar ação</button>

    <div id="message" class="message">
      Deploy automatizado com sucesso!
    </div>
  </main>

  <script>
    function mostrarMensagem() {
      const message = document.getElementById('message');
      message.style.display = 'block';
    }
  </script>
</body>
</html>
